# permissions for end users to edit falconsecurities.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: falcon-operator
    app.kubernetes.io/managed-by: kustomize
  name: falcon-falconsecurity-editor-role
rules:
- apiGroups:
  - falcon.crowdstrike.com
  resources:
  - falconsecurities
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - falcon.crowdstrike.com
  resources:
  - falconsecurities/status
  verbs:
  - get

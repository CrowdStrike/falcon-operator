# permissions for end users to view falconsecurities.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: falcon-operator
    app.kubernetes.io/managed-by: kustomize
  name: falcon-falconsecurity-viewer-role
rules:
- apiGroups:
  - falcon.crowdstrike.com
  resources:
  - falconsecurities
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - falcon.crowdstrike.com
  resources:
  - falconsecurities/status
  verbs:
  - get

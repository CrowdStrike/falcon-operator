# Falcon Container Installation with AITap AI-DR support.
#
# REQUIRED: Please fill in your CrowdStrike Falcon credentials and AITap AI-DR token below.
#
# To learn more about FalconContainer resource please consult documentation at
# https://github.com/CrowdStrike/falcon-operator/tree/main/docs/container

apiVersion: falcon.crowdstrike.com/v1alpha1
kind: FalconContainer
metadata:
  labels:
    crowdstrike.com/component: sample
    crowdstrike.com/created-by: falcon-operator
    crowdstrike.com/instance: falcon-sidecar-sensor-aitap
    crowdstrike.com/managed-by: kustomize
    crowdstrike.com/name: falconcontainer
    crowdstrike.com/part-of: Falcon
    crowdstrike.com/provider: crowdstrike
  name: falcon-container-sensor-aitap
spec:
  falcon_api:
    client_id: PLEASE_FILL_IN
    client_secret: PLEASE_FILL_IN
    cloud_region: autodiscover
  registry:
    type: crowdstrike
  falcon:
    trace: none
    tags:
      - sidecar
      - aitap
  injector:
    aitap:
      aidrCollectorApiToken: PLEASE_FILL_IN_AIDR_TOKEN
      namespaces: "default,kube-public"
